<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 300px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { margin: 0; color: #4285f4; }
        .cls-card { background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px solid #ddd; }
        .cls-score { font-size: 32px; font-weight: bold; margin: 10px 0; }
        .cls-status { font-size: 14px; font-weight: bold; }
        .controls button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #focusBtn { background: #34a853; color: white; font-size: 16px; }
        .controls button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🧠 Saral AI</h2>
        <small>Cognitive Load Assistant</small>
    </div>

    <div class="cls-card">
        <div>Cognitive Load Score (CLS)</div>
        <div class="cls-score" id="clsValue">--</div>
        <div class="cls-status" id="clsStatus">Analyzing page...</div>
    </div>

    <div class="controls">
        <button id="focusBtn">Enable Saral Reader</button>
    </div>

    <script src="/popup/popup.js"></script>
</body>
</html>
