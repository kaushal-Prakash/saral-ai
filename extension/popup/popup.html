<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <h2>🧠 Saral AI</h2>
        <small>Cognitive Load Assistant</small>
    </div>

    <div class="cls-card">
        <div>Cognitive Load Score (CLS)</div>
        <div class="cls-score" id="clsValue">--</div>
        <div class="cls-status" id="clsStatus">Analyzing page...</div>
    </div>

    <div class="theme-section">
        <label for="themeSelect">Reading Profile:</label>
        <select id="themeSelect">
            <option value="default">Default (Clean)</option>
            <option value="adhd">ADHD (High Focus)</option>
            <option value="autism">Autism (Low Sensory)</option>
            <option value="dyslexia">Dyslexia (Readability)</option>
        </select>
    </div>

    <div class="controls">
        <button id="focusBtn">Enable Saral Reader</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
